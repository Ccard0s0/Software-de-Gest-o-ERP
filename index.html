<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>software-de-gest-o-erp</title>
    <script>
      (function() {
        try {
          const saved = localStorage.getItem('eugeen_light_mode');
          const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
          const shouldUseLight = saved === 'true' || (saved === null && prefersLight);
          document.documentElement.classList.toggle('light', shouldUseLight);
          document.documentElement.classList.toggle('dark', !shouldUseLight);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
